<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Heart</title>

    <style>
      *{
          margin:0;
          padding:0;
          box-sizing:border-box;
      }

      body{
          background:#111;
          overflow:hidden;
          display:flex;
          justify-content:center;
          align-items:center;
          height:100vh;
          font-family:Arial, sans-serif;
      }

      #heart{
          position:relative;
          width:650px;
          height:600px;
      }

      .word{
          position:absolute;
          color:#ff4d6d;
          font-size:14px;
          white-space:nowrap;
          opacity:0;
          text-shadow:
              0 0 5px #ff0000,
              0 0 10px #ff0000,
              0 0 18px #ff1a1a,
              0 0 28px #ff3333,
              0 0 40px #ff4d4d;

          transition:opacity .5s;
      }

      .center{
          position:absolute;
          left:50%;
          top:50%;
          transform:translate(-50%,-50%);
          color:white;
          font-size:58px;
          font-family:"Georgia", serif;
          opacity:0;
          text-align:center;

          text-shadow:
              0 0 8px #ff0000,
              0 0 18px #ff0000,
              0 0 35px #ff1a1a,
              0 0 55px #ff3333,
              0 0 80px #ff4d4d,

          background:rgba(255,0,0,.12);
          padding:18px 35px;
          border-radius: 18px;
          box-shadow:
             0 0 20px rgba(255,0,0,.6),
             0 0 45px rgba(255,0,0,.5),
             0 0 80px rgba(255,0,0,.4);

          transition:opacity 2s;

      }
    </style>
  </head>

  <body>
    <div id="heart">
      <div class="center" id="centerText">I Love you.</div>
    </div>

    <script>
      const heart = document.getElementById("heart");
      const center = document.getElementById("centerText");

      let points = [];

      // Heart equation
      for (let t = 0; t < Math.PI * 2; t += 0.04) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y =
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t);

        points.push({
          x: x * 18 + 320,
          y: -y * 18 + 290,
        });
      }

      // Random order for animation
      points = points.sort(() => Math.random() - 0.5);

      let i = 0;

      let timer = setInterval(() => {
        if (i >= points.length) {
          clearInterval(timer);

          center.style.opacity = 1;
          return;
        }

        let p = points[i];

        let span = document.createElement("span");
        span.className = "word";
        span.innerText = "I love you";

        span.style.left = p.x + "px";
        span.style.top = p.y + "px";

        heart.appendChild(span);

        requestAnimationFrame(() => {
          span.style.opacity = 1;
        });

        i++;
      }, 40);
    </script>
  </body>
</html>
