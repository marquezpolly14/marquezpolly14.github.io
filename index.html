<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glowing Clover Field</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: linear-gradient(to bottom, #031b08, #0d2e13, #145c20);
        height: 100vh;
      }

      .clover {
        position: absolute;
        color: #32ff7e;
        user-select: none;
        animation:
          float 5s ease-in-out infinite,
          glow 2s ease-in-out infinite alternate;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-15px) rotate(8deg);
        }
      }

      @keyframes glow {
        from {
          text-shadow:
            0 0 5px #32ff7e,
            0 0 15px #32ff7e;
        }
        to {
          text-shadow:
            0 0 10px #7dff9d,
            0 0 25px #7dff9d,
            0 0 45px #7dff9d;
        }
      }
    </style>
  </head>

  <body>
    <script>
      const total = 300;

      for (let i = 0; i < total; i++) {
        const c = document.createElement("div");
        c.className = "clover";

        c.innerHTML = "🍀";

        c.style.left = Math.random() * 100 + "vw";
        c.style.top = Math.random() * 100 + "vh";

        c.style.fontSize = 35 + Math.random() * 35 + "px";

        c.style.animationDelay = Math.random() * 5 + "s";
        c.style.animationDuration = 4 + Math.random() * 3 + "s";

        document.body.appendChild(c);
      }
    </script>
  </body>
</html>
