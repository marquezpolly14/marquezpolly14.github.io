<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Gift ❤️</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
      }

      .gift {
        position: relative;
        width: 220px;
        height: 180px;
      }

      /* Gift Box */
      .box {
        width: 220px;
        height: 120px;
        background: #ff4d6d;
        position: absolute;
        bottom: 0;
        border-radius: 10px;
        z-index: 2;
      }

      /* Vertical Ribbon */
      .box::before {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 22px;
        height: 100%;
        background: white;
      }

      /* Lid */
      .lid {
        width: 240px;
        height: 45px;
        background: #ff3366;
        position: absolute;
        left: -10px;
        top: 35px;
        border-radius: 10px;
        transition: 0.8s ease;
        transform-origin: left center;
        z-index: 5;
      }

      /* Horizontal Ribbon */
      .lid::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 12px;
        background: white;
        transform: translateY(-50%);
      }

      /* Bow */
      .bow {
        position: absolute;
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 50%;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        z-index: 6;
      }

      .bow::before,
      .bow::after {
        content: "";
        position: absolute;
        width: 35px;
        height: 35px;
        border: 8px solid white;
        border-radius: 50%;
      }

      .bow::before {
        left: -25px;
      }

      .bow::after {
        right: -25px;
      }

      /* Heart */
      .heart {
        position: absolute;
        left: 50%;
        top: 110px;
        transform: translateX(-50%) scale(0);
        font-size: 90px;
        transition: 1s ease;
        z-index: 9;
      }

      /* Message */
      .message {
        position: absolute;
        width: 340px;
        left: 50%;
        top: 20px;
        transform: translateX(-50%) translateY(80px);
        text-align: center;
        font-size: 32px;
        color: #ffffff;
        font-weight: bold;
        opacity: 0;
        transition: 1s ease;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
        z-index: 10;
      }

      /* Animation when opened */
      .open .lid {
        transform: rotate(-35deg) translate(-25px, -55px);
      }

      .open .heart {
        transform: translateX(-50%) translateY(-120px) scale(1.3);
      }

      .open .message {
        opacity: 1;
        transform: translateX(-50%) translateY(-170px);
      }

      .buttons {
        margin-top: 60px;
      }

      button {
        padding: 12px 22px;
        border: none;
        border-radius: 30px;
        background: #ff3366;
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin: 6px;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        background: #e6005c;
      }
    </style>
  </head>

  <body>
    <div class="gift" id="gift">
      <div class="message">I LOVE YOU SO MUCH ❤️</div>

      <div class="heart">❤️</div>

      <div class="lid">
        <div class="bow"></div>
      </div>

      <div class="box"></div>
    </div>

    <div class="buttons">
      <button onclick="openGift()">🎁 Open Gift</button>
      <button onclick="closeGift()">📦 Close Gift</button>
    </div>

    <script>
      function openGift() {
        document.getElementById("gift").classList.add("open");
      }

      function closeGift() {
        document.getElementById("gift").classList.remove("open");
      }
    </script>
  </body>
</html>
