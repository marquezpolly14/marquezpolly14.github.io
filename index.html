<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Special Message ❤️</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        animation: fadeIn 2s;
      }

      h1 {
        color: #ff3366;
        font-size: 2.5em;
      }

      p {
        margin-top: 20px;
        font-size: 1.3em;
        color: #555;
      }

      .heart {
        font-size: 70px;
        color: red;
        animation: beat 1s infinite;
        margin-top: 20px;
      }

      @keyframes beat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hi, CHAGIYA! ❤️</h1>
      <p>I have something to tell you...</p>

      <div class="heart">❤️</div>

      <p style="font-size: 28px; font-weight: bold; color: #ff3366">
        I LOVE YOU SO MUCH! 🥰
      </p>

      <p>
        You're the best thing that ever happened to me. Thank you for making my
        life brighter every single day. ❤️
      </p>
    </div>
  </body>
</html>
